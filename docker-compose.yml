services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: factory-dashboard
    restart: always
    ports:
      - "5173:5173"
    environment:
      PORT: 8787
      DASHBOARD_DB_PATH: /app/server/data/dashboard.db
      GOOSE_CODE_INDEX_LANCEDB_DIR: /app/server/data/codeintel.lancedb
      GOOSE_REPO_ROOT: /work/repo
      GOOSE_LOCAL_IN_CONTAINER: "1"
      GOOSE_DEFAULT_PROVIDER: "custom_kilo_code"
      GOOSE_DEFAULT_MODEL: "kilo/auto"
      GOOSE_NO_PROFILE: "0"
      GOOSE_ENABLE_EVERYTHING: "1"
      GOOSE_FORCE_BUILTINS: "developer,autovisualiser"
      GOOSE_HOME: /app/server/data/goose-runtime
      GOOSE_PRESERVE_HOME: "0"
      XDG_CONFIG_HOME: /app/server/data/goose-runtime/.config
      XDG_CACHE_HOME: /app/server/data/goose-runtime/.cache
      XDG_DATA_HOME: /app/server/data/goose-runtime/.local/share
      XDG_STATE_HOME: /app/server/data/goose-runtime/.local/state
      GOOSE_ENABLE_SUBAGENTS: "0"
      GOOSE_SUBAGENTS_MAX: "1"
      GOOSE_MANAGER_REQUIRED: "0"
      GOOSE_ALLOW_MOCK_FALLBACK: "0"
      GOOSE_HEARTBEAT_ENABLED: "0"
      GOOSE_HEARTBEAT_ONLY: "1"
      GOOSE_DISABLE_POST_RUN_AUTOMATION: "0"
      GOOSE_DISABLE_TASK_BRANCH: "0"
      GOOSE_FORCE_AUTO_MERGE: "1"
      GOOSE_AUTO_MERGE_TARGET: "test"
      GOOSE_FAST_TASK_KEYS: "gse"
      GOOSE_FAST_MAX_TURNS: "8"
      GOOSE_FAST_MAX_TOOL_REPETITIONS: "1"
      GOOSE_FAST_TIMEOUT_MS: "300000"
      GOOSE_TIMEOUT_MS: "900000"
      GOOSE_NO_OUTPUT_TIMEOUT_MS: "180000"
      GOOSE_INITIAL_NO_OUTPUT_TIMEOUT_MS: "300000"
    volumes:
      - /home/infosys/work/repo:/work/repo
      - /home/infosys/.config/goose:/seed/goose/config:ro
      - /home/infosys/.cache/goose:/seed/goose/cache:ro
      - /home/infosys/.local/share/goose:/seed/goose/share:ro
      - /home/infosys/.local/state/goose:/seed/goose/state:ro
      - factory_server_data:/app/server/data
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  factory_server_data:
