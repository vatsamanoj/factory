services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: factory-dashboard
    restart: always
    ports:
      - "5173:5173"
    environment:
      PORT: 8787
      DASHBOARD_DB_PATH: /app/server/data/dashboard.db
      GOOSE_CODE_INDEX_LANCEDB_DIR: /app/server/data/codeintel.lancedb
      GOOSE_REPO_ROOT: /app/server/data/repos
    volumes:
      - factory_server_data:/app/server/data
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  factory_server_data:
